/home/sebastian/personal-ai/logs/*.log {
    daily
    rotate 3
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    maxsize 5M
    su sebastian sebastian
}

/home/sebastian/personal-ai/logs/*.jsonl {
    daily
    rotate 2
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    maxsize 10M
    su sebastian sebastian
}
