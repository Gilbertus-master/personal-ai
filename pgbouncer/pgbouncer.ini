[databases]
gilbertus = host=gilbertus-postgres port=5432 dbname=gilbertus

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 5433
unix_socket_dir =
user = postgres
auth_file = /etc/pgbouncer/userlist.txt
auth_type = scram-sha-256
pool_mode = transaction
max_client_conn = 200
default_pool_size = 15
min_pool_size = 3
reserve_pool_size = 5
reserve_pool_timeout = 3
server_idle_timeout = 30
client_idle_timeout = 30
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
stats_period = 60
server_reset_query = DISCARD ALL
ignore_startup_parameters = extra_float_digits
admin_users = gilbertus
