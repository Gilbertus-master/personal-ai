services:
  postgres:
    image: postgres:16
    container_name: gilbertus-postgres
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - gilbertus_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    container_name: gilbertus-qdrant
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - gilbertus_qdrant:/qdrant/storage

  whisper:
    build: ./whisper
    container_name: gilbertus-whisper
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - gilbertus_whisper_models:/models
      - /tmp/whisper_audio:/audio

volumes:
  gilbertus_pgdata:
    name: gilbertus_pgdata
  gilbertus_qdrant:
    name: gilbertus_qdrant
  gilbertus_whisper_models:
    name: gilbertus_whisper_models
