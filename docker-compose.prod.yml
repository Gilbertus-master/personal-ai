# Production Docker Compose for Hetzner deployment
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml logs -f api
#
# Requires: .env file with all credentials

services:
  postgres:
    image: postgres:16
    container_name: gilbertus-postgres
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - gilbertus_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 2G

  qdrant:
    image: qdrant/qdrant:latest
    container_name: gilbertus-qdrant
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - gilbertus_qdrant:/qdrant/storage
    deploy:
      resources:
        limits:
          memory: 2G

  whisper:
    build: ./whisper
    container_name: gilbertus-whisper
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - gilbertus_whisper_models:/models
      - /tmp/whisper_audio:/audio
    deploy:
      resources:
        limits:
          memory: 2G

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gilbertus-api
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:8000:8000"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - QDRANT_URL=http://qdrant:6333
      - WHISPER_URL=http://whisper:9090
    volumes:
      - ./logs:/app/logs
      - ./backups:/app/backups
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  cron:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gilbertus-cron
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    entrypoint: ["/app/scripts/cron_entrypoint.sh"]
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - QDRANT_URL=http://qdrant:6333
      - WHISPER_URL=http://whisper:9090
      - GILBERTUS_API_URL=http://api:8000
    volumes:
      - ./logs:/app/logs
      - ./backups:/app/backups
    depends_on:
      api:
        condition: service_healthy

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - GILBERTUS_API_URL=http://api:8000
    container_name: gilbertus-web
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NEXTAUTH_URL=${GILBERTUS_URL:-https://gilbertus.localhost}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - GILBERTUS_API_URL=http://api:8000
      - GILBERTUS_API_KEY=${GILBERTUS_API_KEY:-}
      - AZURE_AD_CLIENT_ID=${AZURE_AD_CLIENT_ID:-}
      - AZURE_AD_CLIENT_SECRET=${AZURE_AD_CLIENT_SECRET:-}
      - AZURE_AD_TENANT_ID=${AZURE_AD_TENANT_ID:-}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      retries: 3

  # Optional: Caddy reverse proxy with auto-SSL
  caddy:
    image: caddy:2
    container_name: gilbertus-caddy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - web
    profiles:
      - with-ssl

volumes:
  gilbertus_pgdata:
    name: gilbertus_pgdata
  gilbertus_qdrant:
    name: gilbertus_qdrant
  gilbertus_whisper_models:
    name: gilbertus_whisper_models
  caddy_data:
  caddy_config:
